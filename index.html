<!DOCTYPE html>
<html>
<head>
  <title>Smart Hostel AI System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 20px;
      margin: 15px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    input, select {
      padding: 10px;
      margin: 5px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      text-align: left;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🚀 Smart Hostel AI System</h1>
<p>AI-powered productivity & hostel management</p>

<div class="container">

<!-- ⏰ TIME PLANNER -->
<div class="card">
  <h2>⏰ AI Time Planner</h2>

  <select id="examMode">
    <option value="yes">📚 Exam Time</option>
    <option value="no">📅 Normal Days</option>
  </select>

  <select id="studyType">
    <option value="morning">🌅 Morning</option>
    <option value="night">🌙 Night</option>
  </select>

  <input type="number" id="studyHours" placeholder="Study hours">

  <button onclick="generateSmartSchedule()">Generate Plan</button>

  <pre id="scheduleOutput"></pre>

  <div id="taskSection"></div>

  <div style="background:#333;border-radius:10px;">
    <div id="progressBar" style="height:10px;background:#00ffcc;width:0%;border-radius:10px;"></div>
  </div>

  <p id="progressResult"></p>
</div>

<!-- 🚨 ISSUE SYSTEM -->
<div class="card">
  <h2>🚨 Report Issue</h2>

  <input type="text" id="issueLocation" placeholder="Location">

  <select id="issueType">
    <option>Electricity</option>
    <option>Cleaning</option>
    <option>Furniture</option>
  </select>

  <input type="text" id="issueDesc" placeholder="Describe issue">

  <input type="file" id="issuePhoto">

  <button onclick="submitIssue()">Submit</button>

  <p id="issueResult"></p>

  <img id="preview" width="100" style="display:none">

  <p id="issueStatus"></p>

  <button onclick="markResolved()">Resolved</button>
</div>

<!-- 🍽️ MESS FEEDBACK -->
<div class="card">
  <h2>🍽️ Mess Feedback</h2>

  <input type="text" id="studentName" placeholder="Name">

  <select id="mealType">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
  </select>

  <input type="text" id="foodFeedback" placeholder="Feedback">

  <select id="rating">
    <option value="1">⭐1</option>
    <option value="2">⭐⭐2</option>
    <option value="3">⭐⭐⭐3</option>
    <option value="4">⭐⭐⭐⭐4</option>
    <option value="5">⭐⭐⭐⭐⭐5</option>
  </select>

  <input type="file" id="foodImage">

  <button onclick="submitFeedback()">Submit</button>

  <p id="feedbackResult"></p>

  <img id="foodPreview" width="100" style="display:none">
</div>

</div>

<script>

// ===== TIME PLANNER (REALISTIC AI) =====
var totalTasks = 0;
var completedTasks = 0;

function generateSmartSchedule() {
  var exam = document.getElementById("examMode").value;
  var type = document.getElementById("studyType").value;
  var hours = parseInt(document.getElementById("studyHours").value);

  if (!hours || hours <= 0) {
    document.getElementById("scheduleOutput").innerText = "⚠️ Enter valid study hours";
    return;
  }

  var start = (type === "morning") ? 6 : 19;
  var current = start;
  var plan = "";

  if (exam === "yes") {
    plan += "🔥 Exam Mode (Peak Performance Strategy)\n\n";
  } else {
    plan += "📘 Normal Mode (Balanced Study)\n\n";
  }

  plan += formatTime(current)+"-"+formatTime(current+1)+" Warm-up\n";
  current++;

  for (var i = 1; i < hours; i++) {
    var next = current + 1;
    var task = "";

    if (i <= 2) task = "🚀 Deep Focus Study";
    else if (i <= 4) task = "✍️ Practice";
    else if (i <= 6) task = "📖 Study + Notes";
    else task = "🔁 Revision";

    if (exam === "yes" && i % 3 === 0) task = "🧪 Mock Test";

    plan += formatTime(current)+"-"+formatTime(next)+" "+task+"\n";

    if (i % 2 === 0) plan += "☕ Break\n";
    if (i === Math.floor(hours/2)) plan += "🍽️ Long Break\n";

    current = next;
  }

  plan += "\n🌙 Final Revision";

  document.getElementById("scheduleOutput").innerText = plan;

  totalTasks = hours;
  completedTasks = 0;

  var html="";
  for(var j=1;j<=hours;j++){
    html+="Task "+j+" <button onclick='markDone()'>✔️</button> <button onclick='markMiss()'>❌</button><br>";
  }
  document.getElementById("taskSection").innerHTML=html;
}

function markDone(){completedTasks++;updateProgress();}
function markMiss(){updateProgress();}

function updateProgress(){
  var percent=Math.round((completedTasks/totalTasks)*100);
  document.getElementById("progressResult").innerText="Progress: "+percent+"%";
  document.getElementById("progressBar").style.width=percent+"%";
}

function formatTime(h){
  var hr=h%24;
  var suffix=hr>=12?"PM":"AM";
  hr=hr%12||12;
  return hr+":00 "+suffix;
}

// ===== ISSUE SYSTEM =====
function submitIssue(){
  var type=document.getElementById("issueType").value;
  var file=document.getElementById("issuePhoto").files[0];

  var name= type==="Electricity"?"Ravi Electrician ":type==="Cleaning"?"Suresh Cleaner ":"Amit";

  document.getElementById("issueResult").innerText=
  "Assigned: "+name+" (xxxxxxxxxx)\nWarden: Mr.Sharma (XXXXXXXXXX)";

  document.getElementById("issueStatus").innerText="Pending";

  if(file){
    var r=new FileReader();
    r.onload=function(e){
      document.getElementById("preview").src=e.target.result;
      document.getElementById("preview").style.display="block";
    };
    r.readAsDataURL(file);
  }
}

function markResolved(){
  document.getElementById("issueStatus").innerText="Resolved";
}

// ===== MESS =====
function submitFeedback(){
  var file=document.getElementById("foodImage").files[0];

  document.getElementById("feedbackResult").innerText="Sent to Mess Incharge";

  if(file){
    var r=new FileReader();
    r.onload=function(e){
      document.getElementById("foodPreview").src=e.target.result;
      document.getElementById("foodPreview").style.display="block";
    };
    r.readAsDataURL(file);
  }
}

</script>

</body>
</html>
