<!DOCTYPE html>
<html>
<head>
  <title>Smart Hostel AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    select, input {
      padding: 8px;
      margin: 5px;
      width: 80%;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    .chatbox {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>🏠 Smart Hostel AI Dashboard</h1>

<div class="dashboard">

<!-- 🍽️ Mess -->
<div class="card">
  <h2>🍽️ Mess Planner</h2>

  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
  </select>

  <select id="hunger">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>

  <button onclick="messAI()">Predict</button>

  <p id="messResult"></p>
</div>

<!-- ⚡ Electricity -->
<div class="card">
  <h2>⚡ Electricity AI</h2>

  <input type="number" id="people" placeholder="No. of people">

  <select id="device">
    <option>Light</option>
    <option>Fan</option>
    <option>AC</option>
  </select>

  <select id="time">
    <option>Morning</option>
    <option>Evening</option>
    <option>Night</option>
  </select>

  <button onclick="electricityAI()">Analyze</button>

  <p id="electricityResult"></p>
</div>

<!-- 🧺 Laundry -->
<div class="card">
  <h2>🧺 Laundry AI</h2>

  <select id="slot">
    <option>Morning</option>
    <option>Afternoon</option>
    <option>Evening</option>
  </select>

  <select id="urgency">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>

  <button onclick="laundryAI()">Optimize</button>

  <p id="laundryResult"></p>
</div>

</div>

<!-- 🤖 Chatbot -->
<div class="chatbox">
  <h3>🤖 AI Assistant</h3>

  <input type="text" id="chatInput" placeholder="Ask anything...">
  <button onclick="chat()">Send</button>

  <p id="chatOutput"></p>
</div>

<script>

// 🍽️ Mess AI
function messAI() {
  let meal = document.getElementById("meal").value;
  let hunger = document.getElementById("hunger").value;

  let result = "Demand Moderate";

  if (hunger === "High") result = "🔥 High Demand – Increase food";
  if (hunger === "Low") result = "⚠️ Low Demand – Reduce food";

  document.getElementById("messResult").innerText =
    meal + ": " + result;
}

// ⚡ Electricity AI
function electricityAI() {
  let people = document.getElementById("people").value;
  let device = document.getElementById("device").value;
  let time = document.getElementById("time").value;

  let usage = people * (device === "AC" ? 3 : device === "Fan" ? 2 : 1);

  let result = "✅ Efficient";

  if (usage > 6) result = "⚠️ High Usage – Reduce devices";
  if (time === "Night" && usage > 4) result = "🔥 Peak Usage at Night";

  document.getElementById("electricityResult").innerText = result;
}

// 🧺 Laundry AI
function laundryAI() {
  let slot = document.getElementById("slot").value;
  let urgency = document.getElementById("urgency").value;

  let suggestion = "Good time";

  if (slot === "Evening") suggestion = "⚠️ Crowded time";
  if (urgency === "High") suggestion = "🔥 Priority slot recommended";

  document.getElementById("laundryResult").innerText =
    slot + ": " + suggestion;
}

// 🤖 Chatbot
function chat() {
  let input = document.getElementById("chatInput").value.toLowerCase();

  let output = "I can help with hostel management!";

  if (input.includes("mess"))
    output = "Mess demand depends on student hunger level.";

  else if (input.includes("electricity"))
    output = "Electricity peaks at night, reduce AC usage.";

  else if (input.includes("laundry"))
    output = "Morning slots are less crowded.";

  else if (input.includes("help"))
    output = "Ask about mess, electricity or laundry!";

  document.getElementById("chatOutput").innerText = output;
}

</script>

</body>
</html>
