<!DOCTYPE html>
<html>
<head>
  <title>Smart Hostel AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 15px;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 80%;
    }

    .progress {
      background: #ccc;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 10px;
      background: #00ffcc;
      width: 0%;
    }

    .chatbox {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>🏠 Smart Hostel Dashboard</h1>

<div class="dashboard">

  <!-- Mess -->
  <div class="card">
    <h2>🍽️ Mess Planner</h2>
     <h2> Will You Eat Today </h2>
    <button onclick="markAttendance('yes')">Yes</button>
    <button onclick="markAttendance('no')">No</button>
    <p id="messResult"></p>
    <div class="progress"><div id="messBar" class="progress-bar"></div></div>
  </div>

  <!-- Electricity -->
  <div class="card">
    <h2>⚡ Electricity</h2>
    <input type="number" id="hours" placeholder="Hours used">
    <button onclick="analyzeElectricity()">Analyze</button>
    <p id="electricityResult"></p>
    <div class="progress"><div id="elecBar" class="progress-bar"></div></div>
  </div>

  <!-- Laundry -->
  <div class="card">
    <h2>🧺 Laundry</h2>
     <h2> Select which slot you want </h2>
    <select id="slot">
      <option>Morning</option>
      <option>Afternoon</option>
      <option>Evening</option>
    </select>
    <button onclick="bookSlot()">Book</button>
    <p id="laundryResult"></p>
  </div>

</div>

<!-- Chatbot -->
<div class="chatbox">
  <h3>🤖 AI Assistant</h3>
  <input type="text" id="chatInput" placeholder="Ask something...">
  <button onclick="chat()">Send</button>
  <p id="chatOutput"></p>
</div>

<script>
let messCount = 0;

function markAttendance(choice) {
  if (choice === 'yes') messCount++;

  document.getElementById("messResult").innerText =
    "Students: " + messCount;

  document.getElementById("messBar").style.width =
    Math.min(messCount * 10, 100) + "%";
}

function analyzeElectricity() {
  let hours = document.getElementById("hours").value;

  let percent = Math.min(hours * 10, 100);

  document.getElementById("elecBar").style.width = percent + "%";

  let result = hours > 5
    ? "⚠️ High usage"
    : "✅ Efficient";

  document.getElementById("electricityResult").innerText = result;
}

function bookSlot() {
  let slot = document.getElementById("slot").value;

  document.getElementById("laundryResult").innerText =
    "Booked: " + slot;
}

function chat() {
  let input = document.getElementById("chatInput").value.toLowerCase();
  let output = "Try asking about mess or electricity.";

  if (input.includes("mess")) output = "Mess demand is average.";
  if (input.includes("electricity")) output = "Peak usage is evening.";
  if (input.includes("laundry")) output = "Morning is best.";

  document.getElementById("chatOutput").innerText = output;
}
</script>

</body>
</html>
